<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost X</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:#e8edf2;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

header {
  text-align:center;
  padding:60px 20px 30px 20px;
}

header h1 {
  font-size:42px;
  margin:0;
  font-weight:600;
  letter-spacing:1px;
}

header p {
  opacity:0.6;
  margin-top:8px;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.search-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:16px;
  background:#11161c;
  color:white;
}

button {
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#1f6feb;
  color:white;
  font-weight:500;
  cursor:pointer;
}

button:hover {
  background:#2f81f7;
}

.card {
  margin-top:30px;
  background:#11161c;
  padding:25px;
  border-radius:16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.card h2 {
  margin-top:0;
}

#image img {
  width:100%;
  border-radius:12px;
  margin:15px 0;
}

.suggestions button {
  margin:5px 5px 0 0;
  background:#1c222a;
}

.suggestions button:hover {
  background:#2a313a;
}

footer {
  text-align:center;
  padding:50px 20px;
  opacity:0.5;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>BrainBoost X</h1>
  <p>Private Intelligence Engine</p>
</header>

<div class="container">

  <div class="search-box">
    <input id="topicInput" placeholder="Search anything...">
    <button onclick="searchTopic()">Explore</button>
    <button onclick="randomTopic()">Random</button>
  </div>

  <div id="results" class="card" style="display:none;">
    <h2 id="title"></h2>
    <div id="image"></div>
    <p id="overview"></p>

    <h3>Related Topics</h3>
    <div id="related" class="suggestions"></div>
  </div>

</div>

<footer>
BrainBoost X<br>
Engineered by Vrishab Varun<br>
© 2026
</footer>

<script>
async function searchTopic(topicOverride=null) {

  const input = topicOverride || document.getElementById("topicInput").value.trim();
  if(!input) return;

  document.getElementById("results").style.display="block";
  document.getElementById("title").innerText="Thinking...";
  document.getElementById("overview").innerText="";

  try {

    // Intelligent search (forgiving)
    const searchRes = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=search&srsearch=${encodeURIComponent(input)}&srlimit=1`
    );
    const searchData = await searchRes.json();

    if(!searchData.query.search.length) {
      document.getElementById("title").innerText="No results found";
      return;
    }

    const bestMatch = searchData.query.search[0].title;

    const summaryRes = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestMatch)}`
    );

    const summaryData = await summaryRes.json();

    document.getElementById("title").innerText = summaryData.title;
    document.getElementById("overview").innerText = summaryData.extract;

    const imageContainer = document.getElementById("image");
    imageContainer.innerHTML="";

    if(summaryData.thumbnail) {
      imageContainer.innerHTML = 
        `<img src="${summaryData.thumbnail.source}" alt="${summaryData.title}">`;
    }

    // Related suggestions
    const relatedRes = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=search&srsearch=${encodeURIComponent(bestMatch)}&srlimit=6`
    );

    const relatedData = await relatedRes.json();
    const relatedDiv = document.getElementById("related");
    relatedDiv.innerHTML="";

    relatedData.query.search.forEach(item=>{
      const btn = document.createElement("button");
      btn.innerText=item.title;
      btn.onclick=()=>searchTopic(item.title);
      relatedDiv.appendChild(btn);
    });

  } catch(error) {
    document.getElementById("title").innerText="Error loading topic";
  }
}

function randomTopic() {
  fetch("https://en.wikipedia.org/api/rest_v1/page/random/summary")
    .then(res=>res.json())
    .then(data=>{
      searchTopic(data.title);
    });
}
</script>

</body>
</html>
