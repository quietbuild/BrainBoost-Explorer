<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost X</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#ffffff;
  min-height:100vh;
  background: linear-gradient(-45deg,
    #ff0066,
    #6a00ff,
    #00c3ff,
    #00ff88,
    #ffcc00
  );
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  text-align:center;
  padding:70px 20px 40px;
}

header h1{
  font-size:44px;
  margin:0;
  letter-spacing:1px;
  text-shadow:0 0 25px rgba(255,255,255,0.5);
}

header p{
  opacity:0.9;
  margin-top:10px;
  font-size:18px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.search-box{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

input{
  flex:1;
  min-width:200px;
  padding:15px;
  border-radius:14px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.15);
  color:white;
}

input::placeholder{
  color:rgba(255,255,255,0.7);
}

button{
  padding:15px 22px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ffffff,#dddddd);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card{
  margin-top:40px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:25px;
  box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

#image img{
  width:100%;
  border-radius:20px;
  margin:20px 0;
}

.suggestions button{
  margin:6px 6px 0 0;
  background:rgba(255,255,255,0.2);
  color:white;
}

footer{
  text-align:center;
  padding:70px 20px;
  opacity:0.9;
  font-size:14px;
}

</style>
