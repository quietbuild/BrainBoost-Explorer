<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Explorer</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#fff;
  min-height:100vh;
  background: linear-gradient(-45deg,#ff0066,#6a00ff,#00c3ff,#00ff88,#ffcc00);
  background-size:400% 400%;
  animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  text-align:center;
  padding:60px 20px 30px;
}

header h1{
  font-size:42px;
  margin:0;
  text-shadow:0 0 20px rgba(255,255,255,0.5);
}

header p{
  margin-top:10px;
  opacity:0.9;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.search-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
}

input{
  flex:1;
  min-width:200px;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

button:first-of-type{
  background:#ffffff;
  color:#000;
}

button:last-of-type{
  background:#222;
  color:#fff;
}

.card{
  margin-top:30px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:20px;
}

#image img{
  width:100%;
  border-radius:15px;
  margin:15px 0;
}

.suggestions button{
  margin:5px 5px 0 0;
  background:#333;
  color:#fff;
}

footer{
  text-align:center;
  padding:50px 20px;
  opacity:0.9;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>BrainBoost Explorer</h1>
  <p>Built by Vrishab Varun</p>
</header>

<div class="container">

  <div class="search-box">
    <input id="topicInput" placeholder="Search anything...">
    <button onclick="searchTopic()">Search</button>
    <button onclick="randomTopic()">Random</button>
  </div>

  <div id="results" class="card" style="display:none;">
    <h2 id="title"></h2>
    <div id="image"></div>
    <p id="overview"></p>
    <h3>Related Topics</h3>
    <div id="related" class="suggestions"></div>
  </div>

</div>

<footer>
© 2026 BrainBoost Explorer
</footer>

<script>

document.getElementById("topicInput").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    searchTopic();
  }
});

async function searchTopic(topicOverride=null){

  const inputField=document.getElementById("topicInput");
  const input=topicOverride || inputField.value.trim();
  if(!input) return;

  document.getElementById("results").style.display="block";
  document.getElementById("title").innerText="Searching...";
  document.getElementById("overview").innerText="";
  document.getElementById("image").innerHTML="";
  document.getElementById("related").innerHTML="";

  try{

    const searchRes=await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=search&srsearch=${encodeURIComponent(input)}&srlimit=5`
    );

    const searchData=await searchRes.json();

    if(!searchData.query.search.length){
      document.getElementById("title").innerText="No Results Found";
      document.getElementById("overview").innerText="Try another spelling.";
      return;
    }

    const bestMatch=searchData.query.search[0].title;

    const summaryRes=await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestMatch)}`
    );

    const summaryData=await summaryRes.json();

    document.getElementById("title").innerText=summaryData.title;
    document.getElementById("overview").innerText=summaryData.extract;

    if(summaryData.thumbnail){
      document.getElementById("image").innerHTML=
        `<img src="${summaryData.thumbnail.source}" alt="${summaryData.title}">`;
    }

    searchData.query.search.slice(1,6).forEach(item=>{
      const btn=document.createElement("button");
      btn.innerText=item.title;
      btn.onclick=()=>searchTopic(item.title);
      document.getElementById("related").appendChild(btn);
    });

  }catch(error){
    document.getElementById("title").innerText="Connection Error";
    document.getElementById("overview").innerText="Check internet connection.";
  }
}

function randomTopic(){
  fetch("https://en.wikipedia.org/api/rest_v1/page/random/summary")
    .then(res=>res.json())
    .then(data=>{
      searchTopic(data.title);
    });
}

</script>

</body>
</html>
